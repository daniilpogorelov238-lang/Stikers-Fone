<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>StickerClean — удалить фон</title>
    <!-- Библиотека для удаления фона -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.0/dist/background-removal.umd.js">
    </script>
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0b1119;
            background-image: radial-gradient(ellipse at 20% 50%, #162230 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #1a2a3f 0%, transparent 50%),
                linear-gradient(145deg, #070c12 0%, #121c2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== MAIN CARD ===== */
        .app {
            max-width: 580px;
            width: 100%;
            background: rgba(18, 28, 40, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 28px 36px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.25s;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #f0f6ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span {
            background: linear-gradient(135deg, #6d8eff, #a78bfa);
            font-size: 1rem;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .badge {
            background: rgba(109, 142, 255, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8ba5e0;
            border: 1px solid rgba(109, 142, 255, 0.15);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .subhead {
            color: #99b0d0;
            font-size: 0.95rem;
            margin: 6px 0 22px 0;
            padding-left: 18px;
            border-left: 3px solid #5f7ef0;
            background: rgba(79, 125, 243, 0.06);
            border-radius: 0 12px 12px 0;
            padding: 8px 16px;
            backdrop-filter: blur(4px);
        }

        /* ===== DROP ZONE ===== */
        .drop-zone {
            background: rgba(26, 40, 58, 0.6);
            border: 2px dashed rgba(100, 130, 200, 0.25);
            border-radius: 32px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            margin-bottom: 24px;
        }
        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #6d8eff;
            background: rgba(40, 60, 90, 0.5);
            box-shadow: inset 0 0 0 1px #4f7df3, 0 8px 30px rgba(79, 125, 243, 0.08);
            transform: scale(1.01);
        }
        .drop-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .drop-zone .icon {
            font-size: 44px;
            line-height: 1;
            margin-bottom: 6px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }
        .drop-zone .title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #dce6f2;
        }
        .drop-zone .hint {
            font-size: 0.8rem;
            color: #7a94b5;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .drop-zone .hint span {
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== PREVIEW GRID ===== */
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 18px 0 22px;
        }
        .preview-box {
            background: #0f1a26;
            border-radius: 24px;
            padding: 12px 12px 14px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.2s;
        }
        .preview-box:hover {
            border-color: rgba(109, 142, 255, 0.15);
        }
        .preview-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #6f8aac;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
        }
        .preview-box .image-wrap {
            width: 100%;
            aspect-ratio: 1/1;
            background: repeating-conic-gradient(#1f3145 0% 25%, #122031 0% 50%) 0 0 / 18px 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .preview-box .image-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        .preview-box .image-wrap .placeholder {
            color: #4f6a8a;
            font-size: 0.75rem;
            opacity: 0.6;
            font-weight: 500;
        }
        .preview-box .image-wrap .check-mark {
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: #1f8b6b;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 6px 0 12px;
        }
        .btn {
            flex: 1 1 120px;
            padding: 14px 16px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #23344a;
            color: #d0def0;
            border: 1px solid #314a65;
            box-shadow: 0 4px 0 #0d1622;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0d1622;
        }
        .btn:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0d1622;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f7df3, #7c5cfc);
            border-color: #6f8eff;
            box-shadow: 0 4px 0 #1f3f96;
            color: #fff;
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #1f3f96;
        }
        .btn-success {
            background: #1f8b6b;
            border-color: #3bb58b;
            box-shadow: 0 4px 0 #0e4a35;
            color: #fff;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3e5775;
            box-shadow: none;
            color: #b0c8e5;
        }
        .btn-outline:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* ===== STATUS ===== */
        .status-bar {
            background: #0e1a28;
            border-radius: 60px;
            padding: 12px 20px;
            margin: 6px 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            border-left: 3px solid #4f7df3;
            transition: 0.2s;
        }
        .status-bar .msg {
            color: #c8daf0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-bar .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #2f4a6a;
            border-top: 3px solid #7fa2ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .status-bar .file-info {
            font-size: 0.7rem;
            color: #5f7d9e;
            background: #1a2d40;
            padding: 4px 14px;
            border-radius: 40px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        /* ===== DOWNLOAD ===== */
        .download-area {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }
        .download-btn {
            background: linear-gradient(135deg, #1f8b6b, #14a87e);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid #3bb58b;
            box-shadow: 0 4px 0 #0e4a35, 0 8px 24px rgba(31, 139, 107, 0.2);
            transition: all 0.15s;
            width: 100%;
            justify-content: center;
        }
        .download-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0e4a35, 0 8px 24px rgba(31, 139, 107, 0.15);
        }
        .download-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0e4a35;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #3e5a78;
            text-align: center;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .footer span {
            opacity: 0.6;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .app {
                padding: 20px 16px 28px;
                border-radius: 32px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .header h1 span {
                font-size: 0.75rem;
                padding: 0 10px;
            }
            .preview-grid {
                gap: 10px;
            }
            .btn {
                flex: 1 1 100%;
            }
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .status-bar .file-info {
                max-width: 100%;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <h1>
                🧼 StickerClean
                <span>BG</span>
            </h1>
            <div class="badge">✨ AI</div>
        </div>
        <div class="subhead">Удали фон в один клик — идеально для Telegram-стикеров</div>

        <!-- DROP ZONE -->
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*" />
            <div class="icon">🖼️</div>
            <div class="title">Нажмите или перетащите изображение</div>
            <div class="hint">
                <span>PNG / JPG / WEBP</span>
                <span>до 10 МБ</span>
                <span>📱 с телефона или ПК</span>
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-grid">
            <div class="preview-box">
                <div class="label">📷 Исходник</div>
                <div class="image-wrap" id="originalWrap">
                    <span class="placeholder">Нет</span>
                </div>
            </div>
            <div class="preview-box">
                <div class="label">✨ Без фона</div>
                <div class="image-wrap" id="resultWrap">
                    <span class="placeholder">Ждёт</span>
                </div>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="btn-group">
            <button class="btn btn-outline" id="loadSampleBtn">📂 Пример</button>
            <button class="btn btn-primary" id="removeBgBtn" disabled>✨ Удалить фон</button>
        </div>

        <!-- STATUS -->
        <div class="status-bar" id="statusBar">
            <div class="msg" id="statusMessage">📌 Загрузите изображение</div>
            <div class="file-info" id="fileInfo">—</div>
        </div>

        <!-- DOWNLOAD -->
        <div class="download-area" id="downloadContainer" style="display: none;">
            <button class="download-btn" id="downloadBtn">
                ⬇ Скачать стикер (PNG)
            </button>
        </div>

        <div class="footer">
            <span>⚡ Работает в браузере</span>
            <span>🧠 Нейросеть Rembg</span>
            <span>🔒 всё локально</span>
        </div>
    </div>

    <script>
        (function() {
            // ===== DOM =====
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const originalWrap = document.getElementById('originalWrap');
            const resultWrap = document.getElementById('resultWrap');
            const removeBgBtn = document.getElementById('removeBgBtn');
            const loadSampleBtn = document.getElementById('loadSampleBtn');
            const statusMessage = document.getElementById('statusMessage');
            const fileInfo = document.getElementById('fileInfo');
            const downloadContainer = document.getElementById('downloadContainer');
            const downloadBtn = document.getElementById('downloadBtn');

            // ===== STATE =====
            let currentFile = null;
            let originalImageUrl = null;
            let resultBlobUrl = null;
            let isProcessing = false;

            // ===== HELPERS =====
            function setStatus(text, isError = false, isSpinner = false) {
                statusMessage.innerHTML = text;
                const bar = document.getElementById('statusBar');
                if (isError) {
                    bar.style.borderLeftColor = '#e55a5a';
                } else {
                    bar.style.borderLeftColor = '#4f7df3';
                }
                if (isSpinner) {
                    statusMessage.innerHTML = `<span class="spinner"></span> ${text}`;
                }
            }

            function setFileInfo(name) {
                if (name && name.length > 25) {
                    fileInfo.textContent = name.slice(0, 22) + '…';
                } else {
                    fileInfo.textContent = name || '—';
                }
            }

            function clearResult() {
                if (resultBlobUrl) {
                    URL.revokeObjectURL(resultBlobUrl);
                    resultBlobUrl = null;
                }
                resultWrap.innerHTML = `<span class="placeholder">Ждёт</span>`;
                downloadContainer.style.display = 'none';
            }

            function showOriginal(src) {
                originalWrap.innerHTML = `<img src="${src}" alt="original" />`;
            }

            function showResult(blobUrl) {
                resultWrap.innerHTML = `<img src="${blobUrl}" alt="result" /><div class="check-mark">✓</div>`;
                downloadContainer.style.display = 'flex';
                downloadBtn.onclick = function() {
                    if (resultBlobUrl) {
                        const a = document.createElement('a');
                        a.href = resultBlobUrl;
                        a.download = 'sticker_no_bg.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                };
            }

            function resetUI(keepFile = false) {
                if (!keepFile) {
                    if (currentFile) currentFile = null;
                    if (originalImageUrl) {
                        URL.revokeObjectURL(originalImageUrl);
                        originalImageUrl = null;
                    }
                    originalWrap.innerHTML = `<span class="placeholder">Нет</span>`;
                    clearResult();
                    removeBgBtn.disabled = true;
                    setStatus('📌 Загрузите изображение');
                    setFileInfo(null);
                    downloadContainer.style.display = 'none';
                } else {
                    if (currentFile && !resultBlobUrl) {
                        removeBgBtn.disabled = false;
                        setStatus('🔄 Нажмите "Удалить фон"');
                    }
                }
            }

            // ===== HANDLE FILE =====
            function handleFile(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    setStatus('❌ Пожалуйста, выберите изображение', true);
                    return;
                }
                if (file.size > 10 * 1024 * 1024) {
                    setStatus('❌ Файл слишком большой (макс. 10 МБ)', true);
                    return;
                }

                if (originalImageUrl) URL.revokeObjectURL(originalImageUrl);
                clearResult();

                currentFile = file;
                const url = URL.createObjectURL(file);
                originalImageUrl = url;
                showOriginal(url);
                removeBgBtn.disabled = false;
                setStatus(`✅ Загружен: ${file.name}`);
                setFileInfo(file.name);
                downloadContainer.style.display = 'none';
            }

            // ===== REMOVE BACKGROUND =====
            async function removeBackground() {
                if (!currentFile || isProcessing) return;
                if (typeof window.removeBackground === 'undefined') {
                    setStatus('❌ Библиотека не загружена. Проверьте интернет.', true);
                    return;
                }

                isProcessing = true;
                removeBgBtn.disabled = true;
                setStatus('⏳ Удаление фона...', false, true);

                try {
                    const imageData = await fileToDataURL(currentFile);
                    const resultBlob = await window.removeBackground(imageData, {
                        model: 'medium',
                        output: { format: 'png' },
                        progress: (key, current, total) => {
                            if (key === 'progress') {
                                const pct = Math.round((current / total) * 100);
                                if (pct % 10 === 0) {
                                    setStatus(`⏳ Удаление фона... ${pct}%`, false, true);
                                }
                            }
                        }
                    });

                    if (resultBlobUrl) URL.revokeObjectURL(resultBlobUrl);
                    resultBlobUrl = URL.createObjectURL(resultBlob);
                    showResult(resultBlobUrl);
                    setStatus(`✅ Готово! Фон удалён. Скачайте стикер.`);
                    removeBgBtn.disabled = false;
                    isProcessing = false;

                } catch (err) {
                    console.error(err);
                    setStatus(`❌ Ошибка: ${err.message || 'неизвестная ошибка'}`, true);
                    removeBgBtn.disabled = false;
                    isProcessing = false;
                    clearResult();
                }
            }

            function fileToDataURL(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(new Error('Не удалось прочитать файл'));
                    reader.readAsDataURL(file);
                });
            }

            // ===== LOAD SAMPLE =====
            function loadSample() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // фон
                const grd = ctx.createRadialGradient(200, 200, 30, 300, 300, 300);
                grd.addColorStop(0, '#ffb07c');
                grd.addColorStop(0.5, '#db6e3a');
                grd.addColorStop(1, '#7a3a1a');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, 512, 512);

                // стикер
                ctx.font = 'bold 200px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#fff5e0';
                ctx.fillText('😎', 256, 260);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#f0dbb0';
                ctx.fillText('😎', 256, 258);

                canvas.toBlob((blob) => {
                    if (!blob) return;
                    const file = new File([blob], 'sample_sticker.png', { type: 'image/png' });
                    if (originalImageUrl) URL.revokeObjectURL(originalImageUrl);
                    clearResult();
                    currentFile = file;
                    const url = URL.createObjectURL(file);
                    originalImageUrl = url;
                    showOriginal(url);
                    removeBgBtn.disabled = false;
                    setStatus(`✅ Пример загружен`, false);
                    setFileInfo('sample_sticker.png');
                    downloadContainer.style.display = 'none';
                    fileInput.value = '';
                }, 'image/png');
            }

            // ===== EVENTS =====
            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });

            removeBgBtn.addEventListener('click', removeBackground);
            loadSampleBtn.addEventListener('click', loadSample);

            // инициализация
            setStatus('📌 Загрузите изображение');
            removeBgBtn.disabled = true;
        })();
    </script>
</body>
</html>
