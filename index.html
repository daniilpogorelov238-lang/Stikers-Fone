<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Удалить фон стикера</title>
  <!-- Используем Rembg (он же @imgly/background-removal) через CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.0/dist/background-removal.umd.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1219 0%, #1a2633 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: rgba(30, 40, 51, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 42px;
      padding: 28px 24px 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
      transition: all 0.2s;
    }
    h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #f0f4fa;
      margin: 0 0 6px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 small {
      font-size: 1rem;
      font-weight: 400;
      color: #8b9bb5;
      margin-left: auto;
      background: #202d3d;
      padding: 4px 14px;
      border-radius: 40px;
    }
    .sub {
      color: #a2b6d0;
      margin: 0 0 24px 0;
      font-size: 0.95rem;
      border-left: 3px solid #4f7df3;
      padding-left: 14px;
      background: rgba(79, 125, 243, 0.08);
      border-radius: 0 12px 12px 0;
    }
    .drop-zone {
      background: #202d3d;
      border: 2px dashed #3e5066;
      border-radius: 32px;
      padding: 40px 12px;
      text-align: center;
      color: #b7cbdf;
      transition: 0.2s;
      cursor: pointer;
      position: relative;
      margin-bottom: 24px;
      background-image: repeating-linear-gradient(45deg, #2a384b 0px, #2a384b 2px, transparent 2px, transparent 8px);
      background-size: 20px 20px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #6d8eff;
      background-color: #263545;
      box-shadow: inset 0 0 0 2px #4f7df3;
    }
    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-zone svg {
      width: 48px;
      height: 48px;
      stroke: #8ba1c0;
      stroke-width: 1.5;
      fill: none;
    }
    .drop-zone .icon-big {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .drop-zone .text {
      font-weight: 500;
      font-size: 1.1rem;
    }
    .drop-zone .hint {
      font-size: 0.85rem;
      color: #7a8fa8;
      margin-top: 8px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin: 20px 0 24px;
    }
    .preview-box {
      background: #16212e;
      border-radius: 24px;
      padding: 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .preview-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7f93ae;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .preview-box .image-wrap {
      width: 100%;
      aspect-ratio: 1/1;
      background: repeating-conic-gradient(#2f4055 0% 25%, #1b2838 0% 50%) 0 0 / 20px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .preview-box .image-wrap img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
    }
    .preview-box .image-wrap .placeholder {
      color: #556f8a;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }
    .btn {
      background: #2e4058;
      border: none;
      color: #eaf0f8;
      font-weight: 500;
      padding: 14px 24px;
      border-radius: 60px;
      font-size: 1rem;
      flex: 1 1 140px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.15s;
      box-shadow: 0 4px 0 #0f1721;
      cursor: pointer;
      border: 1px solid #415972;
    }
    .btn-primary {
      background: #4f7df3;
      border-color: #6f94ff;
      box-shadow: 0 4px 0 #1f3f96;
      color: white;
    }
    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1f3f96;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0f1721;
    }
    .btn:disabled {
      opacity: 0.5;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0f1721;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    .btn-success {
      background: #2b9c76;
      border-color: #3dbd91;
      box-shadow: 0 4px 0 #176649;
    }
    .status {
      background: #1b2838;
      border-radius: 60px;
      padding: 12px 18px;
      margin: 18px 0 8px;
      text-align: center;
      font-size: 0.9rem;
      color: #b7cbdf;
      border-left: 3px solid #4f7df3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #405a78;
      border-top: 3px solid #7fa2ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: #4b637d;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .download-btn {
      background: #1f8b6b;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 1px solid #3bb58b;
      transition: 0.15s;
      box-shadow: 0 3px 0 #0e4a35;
    }
    .download-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0e4a35;
    }
    .download-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .flex-center {
      display: flex;
      justify-content: center;
    }
    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .preview-grid { gap: 12px; }
      .btn { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>
    🧽 Стикер-чист
    <small>BG</small>
  </h1>
  <div class="sub">Удали фон — оставь только стикер</div>

  <!-- Зона загрузки -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" />
    <div class="icon-big">🖼️</div>
    <div class="text">Нажми или перетащи изображение</div>
    <div class="hint">PNG, JPG, WEBP — до 10 МБ</div>
  </div>

  <!-- Превью -->
  <div class="preview-grid">
    <div class="preview-box">
      <div class="label">Исходник</div>
      <div class="image-wrap" id="originalWrap">
        <span class="placeholder">Нет</span>
      </div>
    </div>
    <div class="preview-box">
      <div class="label">Без фона</div>
      <div class="image-wrap" id="resultWrap">
        <span class="placeholder">Ждёт</span>
      </div>
    </div>
  </div>

  <!-- Кнопки -->
  <div class="btn-group">
    <button class="btn" id="loadSampleBtn">📂 Пример</button>
    <button class="btn btn-primary" id="removeBgBtn" disabled>✨ Удалить фон</button>
  </div>

  <!-- статус / результат -->
  <div class="status" id="statusMessage">
    <span>📌 Загрузите изображение</span>
  </div>

  <!-- Кнопка скачать (появляется когда есть результат) -->
  <div class="flex-center" id="downloadContainer" style="display: none; margin-top: 4px;">
    <button class="download-btn" id="downloadBtn">⬇ Скачать стикер (PNG)</button>
  </div>

  <div class="footer">
    Работает в браузере • фон удаляется нейросетью (Rembg)
  </div>
</div>

<script>
  (function() {
    // DOM элементы
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const originalWrap = document.getElementById('originalWrap');
    const resultWrap = document.getElementById('resultWrap');
    const removeBgBtn = document.getElementById('removeBgBtn');
    const loadSampleBtn = document.getElementById('loadSampleBtn');
    const statusMessage = document.getElementById('statusMessage');
    const downloadContainer = document.getElementById('downloadContainer');
    const downloadBtn = document.getElementById('downloadBtn');

    // Состояние
    let currentFile = null;          // File объект
    let originalImageUrl = null;    // для отображения и повторной обработки
    let resultBlobUrl = null;       // результат (PNG без фона)
    let isProcessing = false;

    // === вспомогательные функции ===
    function setStatus(text, isError = false, isSpinner = false) {
      statusMessage.innerHTML = text;
      if (isError) {
        statusMessage.style.borderLeftColor = '#e55a5a';
      } else {
        statusMessage.style.borderLeftColor = '#4f7df3';
      }
      if (isSpinner) {
        statusMessage.innerHTML = `<span class="spinner"></span> ${text}`;
      }
    }

    function clearResult() {
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
      resultWrap.innerHTML = `<span class="placeholder">Ждёт</span>`;
      downloadContainer.style.display = 'none';
    }

    // отобразить исходник
    function showOriginal(src) {
      originalWrap.innerHTML = `<img src="${src}" alt="original" />`;
    }

    // отобразить результат
    function showResult(blobUrl) {
      resultWrap.innerHTML = `<img src="${blobUrl}" alt="result" />`;
      downloadContainer.style.display = 'flex';
      // обновляем ссылку для скачивания
      downloadBtn.onclick = function() {
        if (resultBlobUrl) {
          const a = document.createElement('a');
          a.href = resultBlobUrl;
          a.download = 'sticker_no_bg.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
      };
    }

    // сброс кнопок и состояния
    function resetUI(keepFile = false) {
      if (!keepFile) {
        currentFile = null;
        if (originalImageUrl) {
          URL.revokeObjectURL(originalImageUrl);
          originalImageUrl = null;
        }
        originalWrap.innerHTML = `<span class="placeholder">Нет</span>`;
        clearResult();
        removeBgBtn.disabled = true;
        setStatus('📌 Загрузите изображение');
        downloadContainer.style.display = 'none';
      } else {
        // если файл есть, но нет результата
        if (currentFile && !resultBlobUrl) {
          removeBgBtn.disabled = false;
          setStatus('🔄 Нажмите "Удалить фон"');
        }
      }
    }

    // === Обработка файла ===
    function handleFile(file) {
      if (!file) return;
      // проверка типа
      if (!file.type.startsWith('image/')) {
        setStatus('❌ Пожалуйста, выберите изображение', true);
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        setStatus('❌ Файл слишком большой (макс. 10 МБ)', true);
        return;
      }

      // отменяем предыдущие
      if (originalImageUrl) URL.revokeObjectURL(originalImageUrl);
      clearResult();

      currentFile = file;
      const url = URL.createObjectURL(file);
      originalImageUrl = url;
      showOriginal(url);
      removeBgBtn.disabled = false;
      setStatus(`✅ Загружен: ${file.name} (${(file.size/1024).toFixed(0)} КБ)`);
      downloadContainer.style.display = 'none';
    }

    // === Удаление фона через @imgly/background-removal ===
    async function removeBackground() {
      if (!currentFile || isProcessing) return;

      // проверяем что библиотека загружена
      if (typeof window.removeBackground === 'undefined') {
        setStatus('❌ Библиотека не загружена. Проверьте интернет.', true);
        return;
      }

      isProcessing = true;
      removeBgBtn.disabled = true;
      setStatus('⏳ Удаление фона...', false, true);

      try {
        // конвертим файл в dataURL или blob
        const imageData = await fileToDataURL(currentFile);

        // вызов rembg
        const resultBlob = await window.removeBackground(imageData, {
          model: 'medium',    // можно 'small' или 'large' 
          output: {
            format: 'png'
          },
          progress: (key, current, total) => {
            // можно выводить прогресс, но для простоты оставим
            if (key === 'progress') {
              const pct = Math.round((current / total) * 100);
              if (pct % 10 === 0) setStatus(`⏳ Удаление фона... ${pct}%`, false, true);
            }
          }
        });

        // создаем URL для результата
        if (resultBlobUrl) URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = URL.createObjectURL(resultBlob);
        showResult(resultBlobUrl);
        setStatus(`✅ Готово! Фон удалён. Скачайте стикер.`);
        downloadContainer.style.display = 'flex';
        removeBgBtn.disabled = false;
        isProcessing = false;

      } catch (err) {
        console.error(err);
        setStatus(`❌ Ошибка: ${err.message || 'неизвестная ошибка'}`, true);
        removeBgBtn.disabled = false;
        isProcessing = false;
        clearResult();
      }
    }

    // хелпер: файл → dataURL
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(new Error('Не удалось прочитать файл'));
        reader.readAsDataURL(file);
      });
    }

    // === Загрузка примера ===
    function loadSample() {
      // создаём небольшое изображение-пример (градиент+фигура)
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      // фон с градиентом
      const grd = ctx.createRadialGradient(200, 200, 20, 300, 300, 300);
      grd.addColorStop(0, '#ffb07c');
      grd.addColorStop(0.5, '#db6e3a');
      grd.addColorStop(1, '#7a3a1a');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, 512, 512);
      // рисуем стикер-смайлик
      ctx.font = 'bold 200px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#fff5e0';
      ctx.fillText('😎', 256, 260);
      ctx.shadowBlur = 0;
      // добавим лёгкую тень от текста
      ctx.fillStyle = '#f0dbb0';
      ctx.fillText('😎', 256, 258);
      
      canvas.toBlob((blob) => {
        if (!blob) return;
        const file = new File([blob], 'sample_sticker.png', { type: 'image/png' });
        // подменяем файл
        if (originalImageUrl) URL.revokeObjectURL(originalImageUrl);
        clearResult();
        currentFile = file;
        const url = URL.createObjectURL(file);
        originalImageUrl = url;
        showOriginal(url);
        removeBgBtn.disabled = false;
        setStatus(`✅ Пример загружен (стикер)`, false);
        downloadContainer.style.display = 'none';
        // сбрасываем input file (чтобы можно было загрузить тот же файл)
        fileInput.value = '';
      }, 'image/png');
    }

    // === события ===
    // загрузка через инпут
    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
      fileInput.value = ''; // чтобы можно было повторно выбрать тот же файл
    });

    // drag and drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // кнопка удаления фона
    removeBgBtn.addEventListener('click', removeBackground);

    // кнопка примера
    loadSampleBtn.addEventListener('click', loadSample);

    // дополнительно: если клик на dropZone но не на input, сработает input (уже есть)

    // инициализация: сообщение
    setStatus('📌 Загрузите изображение');
    removeBgBtn.disabled = true;
  })();
</script>
</body>
</html>
